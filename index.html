<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Punktezähler">

<title>Punktezähler</title>

<style>
    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 15px;
        background: #f2f2f7;
        touch-action: manipulation;
    }

    .container {
        max-width: 700px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    .target-box {
        background: #007AFF;
        color: white;
        padding: 15px;
        border-radius: 15px;
        text-align: center;
        margin-bottom: 20px;
    }

    .target-box input {
        font-size: 24px;
        font-weight: bold;
        width: 120px;
        text-align: center;
        border: none;
        border-radius: 10px;
        padding: 8px;
        color: #007AFF;
    }

    .input-group {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    input[type="text"],
    input[type="number"] {
        flex: 1;
        padding: 15px;
        border: 2px solid #e5e5ea;
        border-radius: 12px;
        font-size: 17px;
        outline: none;
    }

    button {
        background: #007AFF;
        color: white;
        border: none;
        padding: 15px 20px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
    }

    button.secondary {
        background: #8e8e93;
    }

    button.success {
        background: #34c759;
    }

    button.danger {
        background: #ff3b30;
        padding: 8px 12px;
    }

    .sort-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    .player-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .player-card {
        border: 2px solid #e5e5ea;
        border-radius: 15px;
        padding: 15px;
        margin-bottom: 12px;
    }

    .player-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .player-name {
        font-size: 20px;
        font-weight: bold;
    }

    .total-score {
        font-size: 16px;
        color: #666;
        margin-top: 4px;
    }

    .round-input {
        display: flex;
        gap: 10px;
        margin-top: 15px;
    }

    .round-input input {
        flex: 1;
    }

    .history {
        margin-top: 20px;
        padding: 15px;
        background: #f2f2f7;
        border-radius: 12px;
        display: none;
    }

    .history.visible {
        display: block;
    }

    .history h3 {
        margin-top: 0;
    }

    .round-entry {
        padding: 10px;
        border-bottom: 1px solid #ddd;
    }

    .winner {
        border-color: #34c759;
        background: #e8ffe8;
    }

    .winner-badge {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.9);
        z-index: 999;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: white;
    }

    .winner-badge.show {
        display: flex;
    }

    .winner-badge h2 {
        font-size: 40px;
        color: gold;
    }

    .empty-state {
        text-align: center;
        padding: 40px;
        color: #8e8e93;
    }
</style>
</head>

<body>

<div class="container">

    <h1>🏆 Punktezähler</h1>

    <div class="target-box">
        <div>Zielpunktzahl</div>

        <!-- Nummernblock -->
        <input
            type="number"
            inputmode="numeric"
            pattern="[0-9]*"
            id="targetScore"
            value="100"
            min="1"
            onchange="saveGame()"
        >
    </div>

    <div class="input-group">
        <input type="text" id="newPlayerName" placeholder="Neuer Spieler..." maxlength="20">
        <button onclick="addPlayer()">+</button>
    </div>

    <div class="sort-bar">
        <button class="secondary" onclick="sortBy('score')">↓ Punkte</button>
        <button class="secondary" onclick="sortBy('scoreUp')">↑ Punkte</button>
        <button class="secondary" onclick="sortBy('name')">A-Z</button>
        <button class="secondary" onclick="toggleHistory()">📜 Runden</button>
    </div>

    <ul class="player-list" id="playerList">
        <li class="empty-state">Tippe auf + um Spieler hinzuzufügen</li>
    </ul>

    <div id="historyBox" class="history">
        <h3>Rundenverlauf</h3>
        <div id="historyContent"></div>
    </div>

</div>

<div class="winner-badge" id="winnerModal">
    <h2>🎉 GEWONNEN 🎉</h2>
    <div id="winnerName"></div>

    <button onclick="newGame()">Neues Spiel</button>
    <button class="secondary" onclick="closeModal()">Schließen</button>
</div>

<script>

let players = [];
let rounds = [];
let gameEnded = false;

window.onload = function() {

    const saved = localStorage.getItem('punkteSpiel');

    if(saved){

        const data = JSON.parse(saved);

        players = data.players || [];
        rounds = data.rounds || [];
        gameEnded = data.ended || false;

        document.getElementById('targetScore').value =
            data.target || 100;
    }

    render();
}

function saveGame(){

    localStorage.setItem('punkteSpiel', JSON.stringify({
        players,
        rounds,
        ended: gameEnded,
        target: document.getElementById('targetScore').value
    }));
}

function addPlayer(){

    const input = document.getElementById('newPlayerName');

    const name = input.value.trim();

    if(!name) return;

    players.push({
        id: Date.now(),
        name,
        score: 0
    });

    input.value = "";

    saveGame();
    render();
}

function addRound(playerId){

    if(gameEnded) return;

    const input = document.getElementById('round-' + playerId);

    const points = parseInt(input.value);

    if(isNaN(points)) return;

    const player = players.find(p => p.id === playerId);

    player.score += points;

    rounds.push({
        player: player.name,
        points: points,
        total: player.score,
        time: new Date().toLocaleTimeString()
    });

    input.value = "";

    const target =
        parseInt(document.getElementById('targetScore').value);

    if(player.score >= target){

        gameEnded = true;

        showWinner(player);
    }

    saveGame();
    render();
}

function deletePlayer(id){

    if(!confirm("Spieler löschen?")) return;

    players = players.filter(p => p.id !== id);

    saveGame();
    render();
}

function sortBy(type){

    if(type === 'score'){
        players.sort((a,b) => b.score - a.score);
    }

    if(type === 'scoreUp'){
        players.sort((a,b) => a.score - b.score);
    }

    if(type === 'name'){
        players.sort((a,b) =>
            a.name.localeCompare(b.name));
    }

    render();
}

function toggleHistory(){

    document
        .getElementById('historyBox')
        .classList.toggle('visible');
}

function render(){

    const list = document.getElementById('playerList');

    const target =
        parseInt(document.getElementById('targetScore').value);

    if(players.length === 0){

        list.innerHTML =
            '<li class="empty-state">Keine Spieler vorhanden</li>';

        return;
    }

    list.innerHTML = players.map((p,index)=>`

        <li class="player-card ${p.score >= target ? 'winner' : ''}">

            <div class="player-top">

                <div>
                    <div class="player-name">
                        ${index + 1}. ${p.name}
                    </div>

                    <!-- Gesamtpunktzahl -->
                    <div class="total-score">
                        Gesamtpunkte: ${p.score}
                    </div>
                </div>

                <button
                    class="danger"
                    onclick="deletePlayer(${p.id})">
                    🗑
                </button>

            </div>

            <div class="round-input">

                <!-- Nummernblock -->
                <input
                    type="number"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    id="round-${p.id}"
                    placeholder="Punkte"
                >

                <button
                    class="success"
                    onclick="addRound(${p.id})">
                    Hinzufügen
                </button>

            </div>

        </li>

    `).join('');

    renderHistory();
}

function renderHistory(){

    const history = document.getElementById('historyContent');

    if(rounds.length === 0){

        history.innerHTML = "Noch keine Runden";
        return;
    }

    history.innerHTML = rounds.map((r,i)=>`

        <div class="round-entry">

            Runde ${i + 1}<br>

            <strong>${r.player}</strong>
            +${r.points} Punkte<br>

            Gesamt: ${r.total}<br>

            <small>${r.time}</small>

        </div>

    `).join('');
}

function showWinner(player){

    document.getElementById('winnerName').innerHTML =
        `<h1>${player.name}</h1>`;

    document
        .getElementById('winnerModal')
        .classList.add('show');
}

function closeModal(){

    document
        .getElementById('winnerModal')
        .classList.remove('show');
}

function newGame(){

    if(!confirm("Neues Spiel starten?")) return;

    players.forEach(p => p.score = 0);

    rounds = [];

    gameEnded = false;

    saveGame();
    render();

    closeModal();
}

</script>

</body>
</html>
