<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#e8000d">
    <title>UNO Punktezähler</title>
    <link rel="manifest" href="./manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('SW OK'))
                .catch(e => console.log('SW Fehler:', e));
        }
    </script>
    <style>
        /* =====================
           UNO FARBEN & RESET
        ===================== */
        :root {
            --uno-red:    #e8000d;
            --uno-blue:   #0056a2;
            --uno-green:  #009a44;
            --uno-yellow: #ffd900;
            --uno-black:  #1a1a1a;
            --uno-white:  #f5f5f5;
            --card-bg:    #1e1e1e;
            --card-border:#2e2e2e;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0; padding: 0;
        }

        html, body {
            width: 100%; height: 100%;
            overflow-x: hidden;
            background: var(--uno-black);
            color: var(--uno-white);
            touch-action: manipulation;
        }

        .app {
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            padding:
                env(safe-area-inset-top, 10px)
                12px
                env(safe-area-inset-bottom, 10px)
                12px;
            gap: 10px;
        }

        /* =====================
           HEADER
        ===================== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--uno-red);
            border-radius: 16px;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(232,0,13,0.4);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .uno-badge {
            background: var(--uno-yellow);
            color: var(--uno-black);
            font-size: 20px;
            font-weight: 900;
            padding: 3px 10px;
            border-radius: 8px;
            letter-spacing: 1px;
            border: 3px solid var(--uno-black);
            transform: rotate(-3deg);
            display: inline-block;
            font-style: italic;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--uno-white);
            letter-spacing: 0.5px;
        }

        .header-badges {
            display: flex;
            gap: 6px;
        }

        .badge {
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: var(--uno-yellow);
        }

        /* =====================
           TOP CONTROLS
        ===================== */
        .top-controls {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .target-box {
            background: var(--uno-blue);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(0,86,162,0.4);
        }

        .target-box label {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            white-space: nowrap;
            font-weight: 600;
        }

        .target-box input {
            background: rgba(0,0,0,0.3);
            border: none;
            color: var(--uno-yellow);
            font-size: 17px;
            font-weight: 900;
            width: 65px;
            text-align: center;
            outline: none;
            -webkit-appearance: none;
            border-radius: 6px;
            padding: 3px;
        }

        .add-box {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 12px;
            padding: 8px 10px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex: 1;
        }

        .add-box input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--uno-white);
            font-size: 15px;
            outline: none;
            min-width: 0;
        }

        .add-box input[type="text"]::placeholder {
            color: #555;
            font-size: 14px;
        }

        .btn-add-player {
            background: var(--uno-green);
            color: white;
            border: none;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 3px 8px rgba(0,154,68,0.4);
        }

        /* =====================
           SPIELER LISTE
        ===================== */
        .players-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* UNO Kartenfarben rotierend */
        .player-card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 12px 14px;
            border-left: 5px solid var(--uno-red);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.3s;
        }

        .player-card:nth-child(4n+1) { border-left-color: var(--uno-red); }
        .player-card:nth-child(4n+2) { border-left-color: var(--uno-blue); }
        .player-card:nth-child(4n+3) { border-left-color: var(--uno-green); }
        .player-card:nth-child(4n+4) { border-left-color: var(--uno-yellow); }

        .player-card.winner {
            border-left-color: var(--uno-yellow) !important;
            background: #2a2500;
            animation: glow-yellow 2s infinite;
        }

        @keyframes glow-yellow {
            0%, 100% { box-shadow: 0 0 6px var(--uno-yellow); }
            50%       { box-shadow: 0 0 18px var(--uno-yellow); }
        }

        .player-rank {
            font-size: 18px;
            font-weight: 900;
            color: #555;
            min-width: 24px;
            text-align: center;
        }

        .player-rank.first  { color: var(--uno-yellow); }
        .player-rank.second { color: #aaa; }
        .player-rank.third  { color: #cd7f32; }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-name {
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-last-round {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        .player-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .player-input input {
            width: 90px;
            padding: 8px 6px;
            background: #0a0a0a;
            border: 2px solid var(--card-border);
            border-radius: 10px;
            color: white;
            font-size: 20px;
            font-weight: 900;
            text-align: center;
            -webkit-appearance: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .player-input input:focus {
            border-color: var(--uno-red);
        }

        .player-input input::placeholder {
            color: #444;
            font-size: 12px;
            font-weight: normal;
        }

        .player-total {
            font-size: 28px;
            font-weight: 900;
            min-width: 50px;
            text-align: right;
            color: var(--uno-white);
        }

        .btn-delete-player {
            background: transparent;
            border: none;
            color: #444;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }

        /* =====================
           RUNDE SPEICHERN
        ===================== */
        .save-round-btn {
            flex-shrink: 0;
        }

        .save-round-btn button {
            width: 100%;
            padding: 15px;
            background: var(--uno-red);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 20px rgba(232,0,13,0.4);
            text-transform: uppercase;
        }

        .save-round-btn button:active { opacity: 0.85; transform: scale(0.99); }

        /* =====================
           BOTTOM CONTROLS
        ===================== */
        .bottom-controls {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .bottom-controls button {
            flex: 1;
            padding: 12px 6px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
        }

        .btn-undo    { background: var(--uno-blue);  color: white; }
        .btn-history { background: var(--uno-green); color: white; }
        .btn-reset   { background: #2a2a2a; color: #e94560; }

        /* =====================
           VERLAUF MODAL
        ===================== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            padding: 16px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal-overlay.show { display: block; }

        .modal-box {
            background: #1e1e1e;
            border-radius: 18px;
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
            border: 2px solid var(--uno-red);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .modal-header h2 {
            font-size: 18px;
            color: var(--uno-yellow);
        }

        .btn-close {
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: var(--uno-red);
            color: white;
            padding: 8px 6px;
            text-align: center;
            font-size: 12px;
            white-space: nowrap;
        }

        td {
            padding: 7px 6px;
            text-align: center;
            border-bottom: 1px solid #2e2e2e;
            font-size: 13px;
        }

        .td-round { color: #666; font-size: 12px; }
        .td-pos   { color: var(--uno-green); font-weight: 600; }
        .td-neg   { color: var(--uno-red);   font-weight: 600; }
        .td-sum   {
            font-weight: 900;
            background: var(--uno-blue);
            color: var(--uno-yellow);
            font-size: 14px;
        }

        /* =====================
           GEWINNER SCREEN
        ===================== */
        .winner-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.97);
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }

        .winner-overlay.show { display: flex; }

        .winner-cards {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 50px;
        }

        .winner-title {
            font-size: 16px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .winner-name {
            font-size: 38px;
            font-weight: 900;
            color: var(--uno-yellow);
            margin-bottom: 6px;
            text-shadow: 0 0 20px var(--uno-yellow);
        }

        .winner-score {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 40px;
        }

        .winner-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 280px;
        }

        .winner-btns button {
            padding: 15px;
            border-radius: 14px;
            border: none;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        .empty {
            text-align: center;
            color: #444;
            padding: 30px;
            font-size: 15px;
        }
    </style>
</head>
<body>
<div class="app">

    <!-- HEADER -->
    <div class="header">
        <div class="header-logo">
            <span class="uno-badge">UNO</span>
            <span class="header-title">Punktezähler</span>
        </div>
        <div class="header-badges">
            <div class="badge" id="pCount">0 👤</div>
            <div class="badge">Rd. <span id="cRound">1</span></div>
        </div>
    </div>

    <!-- ZIELPUNKTE + SPIELER HINZUFÜGEN -->
    <div class="top-controls">
        <div class="target-box">
            <label>🎯 Ziel</label>
            <input type="number"
                   id="targetScore"
                   value="500"
                   inputmode="numeric"
                   enterkeyhint="done"
                   onchange="saveData()">
        </div>
        <div class="add-box">
            <input type="text"
                   id="pName"
                   placeholder="Spieler hinzufügen..."
                   maxlength="14"
                   enterkeyhint="done">
            <button class="btn-add-player" onclick="addPlayer()">+</button>
        </div>
    </div>

    <!-- SPIELER LISTE -->
    <div class="players-list" id="playersList">
        <div class="empty">🃏 Füge Spieler hinzu um zu beginnen</div>
    </div>

    <!-- RUNDE SPEICHERN -->
    <div class="save-round-btn" id="roundBtnWrap" style="display:none;">
        <button onclick="saveRound()">
            💾 Runde <span id="saveRoundNum">1</span> speichern
        </button>
    </div>

    <!-- BOTTOM CONTROLS -->
    <div class="bottom-controls">
        <button class="btn-undo"    id="undoBtn"  onclick="undoLastRound()" style="display:none;">↩ Rückgängig</button>
        <button class="btn-history" id="histBtn"  onclick="showHistory()"   style="display:none;">📊 Verlauf</button>
        <button class="btn-reset"                 onclick="resetAll()">⟳ Neues Spiel</button>
    </div>

</div>

<!-- VERLAUF MODAL -->
<div class="modal-overlay" id="histModal">
    <div class="modal-box">
        <div class="modal-header">
            <h2>📊 Rundenübersicht</h2>
            <button class="btn-close" onclick="closeHistory()">✕</button>
        </div>
        <div class="table-wrap" id="historyTable"></div>
    </div>
</div>

<!-- GEWINNER OVERLAY -->
<div class="winner-overlay" id="winnerModal">
    <div class="winner-cards">🃏🏆🃏</div>
    <div class="winner-title">Gewinner</div>
    <div class="winner-name"  id="winnerName"></div>
    <div class="winner-score" id="winnerScore"></div>
    <div class="winner-btns">
        <button onclick="resetAll()"    style="background:var(--uno-red);   color:white;">⟳ Neues Spiel</button>
        <button onclick="closeWinner()" style="background:var(--uno-blue);  color:white;">Weiterspielen</button>
    </div>
</div>

<script>
    let players      = [];
    let currentRound = 1;
    let undoStack    = [];
    let gameEnded    = false;

    // ── LADEN ──────────────────────────────────────────
    window.onload = () => {
        const raw = localStorage.getItem('unoGameV1');
        if (raw) {
            const d = JSON.parse(raw);
            players      = d.players      || [];
            currentRound = d.currentRound || 1;
            undoStack    = d.undoStack    || [];
            gameEnded    = d.gameEnded    || false;
            document.getElementById('targetScore').value = d.target || 500;
        }
        updateUI();
    };

    function saveData() {
        localStorage.setItem('unoGameV1', JSON.stringify({
            players, currentRound, undoStack, gameEnded,
            target: document.getElementById('targetScore').value
        }));
    }

    // ── SPIELER HINZUFÜGEN ─────────────────────────────
    function addPlayer() {
        const inp  = document.getElementById('pName');
        const name = inp.value.trim();
        if (!name) { inp.focus(); return; }

        players.push({ id: Date.now(), name, rounds: [], total: 0 });
        inp.value = '';
        inp.focus();
        saveData();
        updateUI();
    }

    document.getElementById('pName')
        .addEventListener('keypress', e => { if (e.key === 'Enter') addPlayer(); });

    // ── RUNDE SPEICHERN ────────────────────────────────
    function saveRound() {
        if (gameEnded) return;

        const inputs   = document.querySelectorAll('.rp-input');
        const snapshot = [];
        let   hasValue = false;

        inputs.forEach((inp, idx) => {
            const raw = inp.value.trim();
            const pts = raw === '' ? 0 : (parseInt(raw) || 0);
            if (raw !== '') hasValue = true;
            snapshot.push({
                playerId:  players[idx].id,
                points:    pts,
                prevTotal: players[idx].total
            });
        });

        if (!hasValue) {
            alert('Bitte mindestens für einen Spieler Punkte eingeben.');
            return;
        }

        undoStack.push({ round: currentRound, snapshot });

        snapshot.forEach((item, idx) => {
            players[idx].rounds.push(item.points);
            players[idx].total += item.points;
        });

        currentRound++;
        saveData();
        updateUI();

        // Gewinner prüfen
        const target = parseInt(document.getElementById('targetScore').value) || 500;
        players.forEach(p => {
            if (p.total >= target && !gameEnded) {
                gameEnded = true;
                saveData();
                showWinner(p);
            }
        });
    }

    // ── RÜCKGÄNGIG ─────────────────────────────────────
    function undoLastRound() {
        if (!undoStack.length) return;
        const last = undoStack.pop();
        currentRound = last.round;
        gameEnded    = false;

        last.snapshot.forEach(item => {
            const p = players.find(x => x.id === item.playerId);
            if (p) { p.rounds.pop(); p.total = item.prevTotal; }
        });

        saveData();
        updateUI();
        document.getElementById('winnerModal').classList.remove('show');
    }

    // ── SPIELER BEARBEITEN / LÖSCHEN ───────────────────
    function editName(id) {
        const p = players.find(x => x.id === id);
        if (!p) return;
        const n = prompt('Neuer Name:', p.name);
        if (n && n.trim()) { p.name = n.trim(); saveData(); updateUI(); }
    }

    function deletePlayer(id) {
        if (!confirm('Spieler wirklich löschen?')) return;
        players = players.filter(p => p.id !== id);
        saveData();
        updateUI();
    }

    // ── NEUES SPIEL ────────────────────────────────────
    function resetAll() {
        if (players.length > 0 && !confirm('Alles zurücksetzen?')) return;
        players = []; currentRound = 1; undoStack = []; gameEnded = false;
        saveData();
        updateUI();
        document.getElementById('winnerModal').classList.remove('show');
    }

    // ── GEWINNER ───────────────────────────────────────
    function showWinner(p) {
        document.getElementById('winnerName').textContent  = p.name;
        document.getElementById('winnerScore').textContent = p.total + ' Punkte';
        document.getElementById('winnerModal').classList.add('show');
    }
    function closeWinner() {
        document.getElementById('winnerModal').classList.remove('show');
    }

    // ── VERLAUF ────────────────────────────────────────
    function showHistory() {
        renderTable();
        document.getElementById('histModal').classList.add('show');
    }
    function closeHistory() {
        document.getElementById('histModal').classList.remove('show');
    }

    function renderTable() {
        const maxR = Math.max(...players.map(p => p.rounds.length), 0);
        const div  = document.getElementById('historyTable');

        if (!players.length || maxR === 0) {
            div.innerHTML = '<p style="color:#555;text-align:center;padding:20px;">Noch keine Runden gespeichert.</p>';
            return;
        }

        let html = '<table><thead><tr><th>Runde</th>';
        players.forEach(p => html += `<th>${p.name}</th>`);
        html += '</tr></thead><tbody>';

        for (let r = 0; r < maxR; r++) {
            html += `<tr><td class="td-round">${r + 1}</td>`;
            players.forEach(p => {
                const pts = p.rounds[r];
                if (pts === undefined) { html += '<td>–</td>'; return; }
                const cls = pts > 0 ? 'td-pos' : pts < 0 ? 'td-neg' : '';
                html += `<td class="${cls}">${pts > 0 ? '+' : ''}${pts}</td>`;
            });
            html += '</tr>';
        }

        html += '<tr>';
        html += '<td class="td-sum">SUMME</td>';
        players.forEach(p => html += `<td class="td-sum">${p.total}</td>`);
        html += '</tr></tbody></table>';
        div.innerHTML = html;
    }

    // ── UI RENDERN ─────────────────────────────────────
    function updateUI() {
        document.getElementById('pCount').textContent      = `${players.length} 👤`;
        document.getElementById('cRound').textContent      = currentRound;
        document.getElementById('saveRoundNum').textContent = currentRound;

        document.getElementById('roundBtnWrap').style.display =
            players.length > 0 ? 'block' : 'none';
        document.getElementById('undoBtn').style.display =
            undoStack.length > 0 ? 'flex' : 'none';
        document.getElementById('histBtn').style.display =
            players.length > 0 && currentRound > 1 ? 'flex' : 'none';

        const list   = document.getElementById('playersList');
        const target = parseInt(document.getElementById('targetScore').value) || 500;

        if (!players.length) {
            list.innerHTML = '<div class="empty">🃏 Füge Spieler hinzu um zu beginnen</div>';
            return;
        }

        // Rang berechnen
        const ranked = [...players].sort((a, b) => b.total - a.total);

        list.innerHTML = players.map(p => {
            const rank     = ranked.findIndex(r => r.id === p.id) + 1;
            const rankCls  = rank === 1 ? 'first' : rank === 2 ? 'second' : rank === 3 ? 'third' : '';
            const isWinner = p.total >= target;
            const lastPts  = p.rounds.length
                ? `Letzte Runde: ${p.rounds.at(-1) >= 0 ? '+' : ''}${p.rounds.at(-1)}`
                : 'Noch keine Punkte';

            return `
            <div class="player-card ${isWinner ? 'winner' : ''}">
                <div class="player-rank ${rankCls}">${rank}.</div>

                <div class="player-info">
                    <div class="player-name" onclick="editName(${p.id})">${p.name}</div>
                    <div class="player-last-round">${lastPts}</div>
                </div>

                <div class="player-right">
                    <div class="player-input">
                        <input type="number"
                               class="rp-input"
                               id="inp-${p.id}"
                               placeholder="Pkt."
                               inputmode="numeric"
                               enterkeyhint="done"
                               ${gameEnded ? 'disabled' : ''}
                               onkeypress="if(event.key==='Enter')this.blur()">
                    </div>
                    <div class="player-total">${p.total}</div>
                    <button class="btn-delete-player" onclick="deletePlayer(${p.id})">✕</button>
                </div>
            </div>`;
        }).join('');
    }
</script>
</body>
</html>
