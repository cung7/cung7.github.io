<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Kartenspiel Zähler</title>
    <link rel="manifest" href="./manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('SW registriert'))
                .catch(err => console.log('Fehler:', err));
        }
    </script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Verhindert Zoom & passt alles ans Handy an */
        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background: #1a1a2e;
            color: white;
            touch-action: manipulation;
            font-size: 16px;
        }

        .app {
            display: flex;
            flex-direction: column;
            min-height: 100dvh; /* dynamic viewport height für iPhone */
            padding: env(safe-area-inset-top, 10px) 
                     12px 
                     env(safe-area-inset-bottom, 10px) 
                     12px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #0f3460;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
        }
        .header .badges {
            display: flex;
            gap: 8px;
        }
        .badge {
            background: #0f3460;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 13px;
            color: #00d9ff;
            font-weight: 600;
        }

        /* ZIELPUNKTE & SPIELER HINZUFÜGEN */
        .top-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .target-box {
            background: #0f3460;
            border-radius: 10px;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }
        .target-box label {
            font-size: 12px;
            color: #aaa;
            white-space: nowrap;
        }
        .target-box input {
            background: transparent;
            border: none;
            color: #e94560;
            font-size: 16px;
            font-weight: bold;
            width: 60px;
            text-align: center;
            outline: none;
            -webkit-appearance: none;
        }

        /* SPIELER HINZUFÜGEN */
        .add-box {
            background: #0f3460;
            border-radius: 10px;
            padding: 8px 10px;
            display: flex;
            gap: 6px;
            align-items: center;
            flex: 2;
        }
        .add-box input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            outline: none;
            min-width: 0;
        }
        .add-box input[type="text"]::placeholder {
            color: #666;
            font-size: 14px;
        }
        .add-box button {
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            width: 34px;
            height: 34px;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SPIELER LISTE */
        .players-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .player-card {
            background: #16213e;
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 8px;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }
        .player-card.winner {
            border-color: #00d9ff;
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px #00d9ff; }
            50% { box-shadow: 0 0 15px #00d9ff; }
        }

        .player-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .player-name-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .rank {
            font-size: 13px;
            color: #666;
            font-weight: 600;
            min-width: 18px;
        }
        .player-name {
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .player-total {
            font-size: 26px;
            font-weight: bold;
            color: #00d9ff;
            min-width: 50px;
            text-align: right;
        }

        .player-bottom {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        /* NUMMERNBLOCK EINGABE */
        .round-input-wrap {
            flex: 1;
            position: relative;
        }
        .round-input-wrap input {
            width: 100%;
            padding: 10px 12px;
            background: #0a0a1a;
            border: 2px solid #0f3460;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            -webkit-appearance: none;
            outline: none;
            transition: border-color 0.2s;
        }
        .round-input-wrap input:focus {
            border-color: #e94560;
        }
        .round-input-wrap input::placeholder {
            color: #444;
            font-size: 13px;
            font-weight: normal;
        }

        .btn-save {
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-delete {
            background: #1a1a2e;
            color: #666;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px 10px;
            font-size: 16px;
            cursor: pointer;
        }

        /* RUNDE SPEICHERN BUTTON */
        .round-btn-wrap {
            margin: 10px 0;
            flex-shrink: 0;
        }
        .btn-round-save {
            width: 100%;
            padding: 14px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.3px;
        }
        .btn-round-save:active { opacity: 0.8; }

        /* BOTTOM CONTROLS */
        .bottom-controls {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            padding-top: 8px;
        }
        .bottom-controls button {
            flex: 1;
            padding: 12px 8px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-undo {
            background: #0f3460;
            color: #00d9ff;
        }
        .btn-history {
            background: #0f3460;
            color: #aaa;
        }
        .btn-reset {
            background: #3d0a14;
            color: #e94560;
        }

        /* HISTORY MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            padding: 20px 12px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .modal-overlay.show { display: block; }
        .modal-box {
            background: #16213e;
            border-radius: 16px;
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .modal-header h2 {
            font-size: 18px;
            color: #00d9ff;
        }
        .btn-close {
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 15px;
            cursor: pointer;
        }

        /* TABELLE */
        .table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 250px;
        }
        th {
            background: #0f3460;
            color: #00d9ff;
            padding: 8px 6px;
            text-align: center;
            position: sticky;
            top: 0;
            font-size: 12px;
        }
        td {
            padding: 7px 6px;
            text-align: center;
            border-bottom: 1px solid #0f3460;
            font-size: 14px;
        }
        .td-round { color: #aaa; font-size: 12px; }
        .td-pos { color: #00d9ff; }
        .td-neg { color: #ff6b6b; }
        .td-sum {
            font-weight: bold;
            background: #0f3460;
            color: white;
        }

        /* GEWINNER SCREEN */
        .winner-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }
        .winner-overlay.show { display: flex; }
        .winner-emoji { font-size: 80px; margin-bottom: 10px; }
        .winner-title { font-size: 28px; color: #00d9ff; font-weight: bold; margin-bottom: 5px; }
        .winner-name { font-size: 36px; font-weight: 900; color: #e94560; margin-bottom: 5px; }
        .winner-score { font-size: 18px; color: #aaa; margin-bottom: 40px; }
        .winner-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }
        .winner-btns button {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            color: #444;
            padding: 30px 20px;
            font-size: 15px;
        }
    </style>
</head>
<body>
<div class="app">

    <!-- HEADER -->
    <div class="header">
        <h1>🃏 Kartenspiel</h1>
        <div class="badges">
            <div class="badge" id="pCount">0/8</div>
            <div class="badge">Rd. <span id="cRound">1</span></div>
        </div>
    </div>

    <!-- ZIELPUNKTE + SPIELER HINZUFÜGEN -->
    <div class="top-controls">
        <div class="target-box">
            <label>Ziel:</label>
            <input type="number"
                   id="targetScore"
                   value="100"
                   inputmode="numeric"
                   enterkeyhint="done"
                   onchange="saveData()">
        </div>
        <div class="add-box" id="addBox">
            <input type="text"
                   id="pName"
                   placeholder="Spieler hinzufügen..."
                   maxlength="12"
                   enterkeyhint="done">
            <button onclick="addPlayer()" id="addBtn">+</button>
        </div>
    </div>

    <!-- SPIELER LISTE -->
    <div class="players-list" id="playersList">
        <div class="empty">Tippe auf + um Spieler hinzuzufügen</div>
    </div>

    <!-- RUNDE SPEICHERN -->
    <div class="round-btn-wrap" id="roundBtnWrap" style="display:none;">
        <button class="btn-round-save" onclick="saveRound()">
            💾 Runde <span id="saveRoundNum">1</span> für alle speichern
        </button>
    </div>

    <!-- BOTTOM CONTROLS -->
    <div class="bottom-controls">
        <button class="btn-undo" onclick="undoLastRound()" id="undoBtn" style="display:none;">
            ↩ Rückgängig
        </button>
        <button class="btn-history" onclick="showHistory()" id="histBtn" style="display:none;">
            📊 Verlauf
        </button>
        <button class="btn-reset" onclick="resetAll()">⟳ Neu</button>
    </div>

</div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="histModal">
    <div class="modal-box">
        <div class="modal-header">
            <h2>📊 Rundenübersicht</h2>
            <button class="btn-close" onclick="closeHistory()">✕ Schließen</button>
        </div>
        <div class="table-wrap" id="historyTable"></div>
    </div>
</div>

<!-- GEWINNER OVERLAY -->
<div class="winner-overlay" id="winnerModal">
    <div class="winner-emoji">🏆</div>
    <div class="winner-title">Gewinner!</div>
    <div class="winner-name" id="winnerName"></div>
    <div class="winner-score" id="winnerScore"></div>
    <div class="winner-btns">
        <button onclick="resetAll()" style="background:#e94560;color:white;">
            ⟳ Neues Spiel
        </button>
        <button onclick="closeWinner()" style="background:#0f3460;color:white;">
            Weiterspielen
        </button>
    </div>
</div>

<script>
    const MAX_PLAYERS = 8;
    let players = [];
    let currentRound = 1;
    let undoStack = [];
    let gameEnded = false;

    // ---- LADEN ----
    window.onload = () => {
        const saved = localStorage.getItem('cardGameV3');
        if (saved) {
            const d = JSON.parse(saved);
            players = d.players || [];
            currentRound = d.currentRound || 1;
            undoStack = d.undoStack || [];
            gameEnded = d.gameEnded || false;
            document.getElementById('targetScore').value = d.target || 100;
            updateUI();
        }
    };

    function saveData() {
        localStorage.setItem('cardGameV3', JSON.stringify({
            players, currentRound, undoStack, gameEnded,
            target: document.getElementById('targetScore').value
        }));
    }

    // ---- SPIELER HINZUFÜGEN ----
    function addPlayer() {
        if (players.length >= MAX_PLAYERS) return;
        const input = document.getElementById('pName');
        const name = input.value.trim();
        if (!name) { input.focus(); return; }

        players.push({ id: Date.now(), name, rounds: [], total: 0 });
        input.value = '';
        input.focus();
        saveData();
        updateUI();
    }

    document.getElementById('pName').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addPlayer();
    });

    // ---- EINZELNE PUNKTE SPEICHERN (Enter auf Nummernblock) ----
    function savePlayerPoints(id) {
        if (gameEnded) return;
        const input = document.getElementById('inp-' + id);
        const val = input.value.trim();
        if (val === '') return;

        const points = parseInt(val) || 0;
        const player = players.find(p => p.id === id);
        if (!player) return;

        // Nur in aktuelle Runde eintragen (nicht speichern als Runde)
        input.dataset.value = val;
        input.blur(); // Tastatur schließen

        checkWinner(player, player.total + points);
    }

    // ---- RUNDE FÜR ALLE SPEICHERN ----
    function saveRound() {
        if (gameEnded) return;
        const inputs = document.querySelectorAll('.rp-input');
        const snapshot = [];
        let hasValue = false;

        inputs.forEach((inp, idx) => {
            const val = parseInt(inp.value) || 0;
            if (inp.value.trim() !== '') hasValue = true;
            snapshot.push({ playerId: players[idx].id, points: val, prevTotal: players[idx].total });
        });

        if (!hasValue) {
            alert('Bitte mindestens für einen Spieler Punkte eingeben.');
            return;
        }

        undoStack.push({ round: currentRound, snapshot });

        snapshot.forEach((item, idx) => {
            players[idx].rounds.push(item.points);
            players[idx].total += item.points;
        });

        // Alle Inputs leeren
        inputs.forEach(inp => { inp.value = ''; inp.dataset.value = ''; });

        currentRound++;
        saveData();
        updateUI();

        // Gewinner prüfen
        const target = parseInt(document.getElementById('targetScore').value) || 100;
        players.forEach(p => {
            if (p.total >= target && !gameEnded) {
                gameEnded = true;
                saveData();
                showWinner(p);
            }
        });
    }

    function checkWinner(player, futureTotal) {
        const target = parseInt(document.getElementById('targetScore').value) || 100;
        if (futureTotal >= target && !gameEnded) {
            // Wird nach "Runde speichern" ausgewertet
        }
    }

    // ---- RÜCKGÄNGIG ----
    function undoLastRound() {
        if (undoStack.length === 0) return;
        const last = undoStack.pop();
        currentRound = last.round;
        gameEnded = false;

        last.snapshot.forEach(item => {
            const p = players.find(x => x.id === item.playerId);
            if (p) {
                p.rounds.pop();
                p.total = item.prevTotal;
            }
        });

        saveData();
        updateUI();
        document.getElementById('winnerModal').classList.remove('show');
    }

    // ---- NAME BEARBEITEN ----
    function editName(id) {
        const p = players.find(x => x.id === id);
        if (!p) return;
        const n = prompt('Neuer Name:', p.name);
        if (n && n.trim()) { p.name = n.trim(); saveData(); updateUI(); }
    }

    // ---- SPIELER LÖSCHEN ----
    function deletePlayer(id) {
        if (!confirm('Spieler wirklich löschen?')) return;
        players = players.filter(p => p.id !== id);
        saveData();
        updateUI();
    }

    // ---- NEUES SPIEL ----
    function resetAll() {
        if (players.length > 0 && !confirm('Alles zurücksetzen?')) return;
        players = []; currentRound = 1; undoStack = []; gameEnded = false;
        saveData();
        updateUI();
        document.getElementById('winnerModal').classList.remove('show');
    }

    // ---- GEWINNER ----
    function showWinner(player) {
        document.getElementById('winnerName').textContent = player.name;
        document.getElementById('winnerScore').textContent = player.total + ' Punkte';
        document.getElementById('winnerModal').classList.add('show');
    }
    function closeWinner() {
        document.getElementById('winnerModal').classList.remove('show');
    }

    // ---- VERLAUF ----
    function showHistory() {
        renderHistoryTable();
        document.getElementById('histModal').classList.add('show');
    }
    function closeHistory() {
        document.getElementById('histModal').classList.remove('show');
    }
    function renderHistoryTable() {
        if (players.length === 0) return;
        const maxR = Math.max(...players.map(p => p.rounds.length), 0);
        if (maxR === 0) {
            document.getElementById('historyTable').innerHTML = '<p style="color:#666;text-align:center;padding:20px;">Noch keine Runden gespeichert.</p>';
            return;
        }
        let html = '<table><thead><tr><th>Runde</th>';
        players.forEach(p => html += `<th>${p.name}</th>`);
        html += '</tr></thead><tbody>';

        for (let r = 0; r < maxR; r++) {
            html += `<tr><td class="td-round">${r + 1}</td>`;
            players.forEach(p => {
                const pts = p.rounds[r];
                if (pts === undefined) { html += '<td>–</td>'; return; }
                const cls = pts > 0 ? 'td-pos' : (pts < 0 ? 'td-neg' : '');
                html += `<td class="${cls}">${pts > 0 ? '+' : ''}${pts}</td>`;
            });
            html += '</tr>';
        }

        html += '<tr><td class="td-sum">SUMME</td>';
        players.forEach(p => html += `<td class="td-sum">${p.total}</td>`);
        html += '</tr></tbody></table>';
        document.getElementById('historyTable').innerHTML = html;
    }

    // ---- UI RENDERN ----
    function updateUI() {
        document.getElementById('pCount').textContent = `${players.length}/8`;
        document.getElementById('cRound').textContent = currentRound;
        document.getElementById('saveRoundNum').textContent = currentRound;
        document.getElementById('addBtn').disabled = players.length >= MAX_PLAYERS;
        document.getElementById('roundBtnWrap').style.display = players.length > 0 ? 'block' : 'none';
        document.getElementById('undoBtn').style.display = undoStack.length > 0 ? 'flex' : 'none';
        document.getElementById('histBtn').style.display = players.length > 0 && currentRound > 1 ? 'flex' : 'none';

        const list = document.getElementById('playersList');
        if (players.length === 0) {
            list.innerHTML = '<div class="empty">Tippe auf + um Spieler hinzuzufügen</div>';
            return;
        }

        const target = parseInt(document.getElementById('targetScore').value) || 100;

        // Sortiert nach Punkten für Rang
        const ranked = [...players].sort((a, b) => b.total - a.total);

        list.innerHTML = players.map(p => {
            const rank = ranked.findIndex(r => r.id === p.id) + 1;
            const isWinner = p.total >= target;
            return `
                <div class="player-card ${isWinner ? 'winner' : ''}">
                    <div class="player-top">
                        <div class="player-name-wrap">
                            <span class="rank">${rank}.</span>
                            <span class="player-name" onclick="editName(${p.id})">${p.name}</span>
                        </div>
                        <div class="player-total">${p.total}</div>
                    </div>
                    <div class="player-bottom">
                        <div class="round-input-wrap">
                            <input type="number"
                                   class="rp-input"
                                   id="inp-${p.id}"
                                   placeholder="Punkte Runde ${currentRound}"
                                   inputmode="numeric"
                                   enterkeyhint="done"
                                   onkeypress="if(event.key==='Enter'){savePlayerPoints(${p.id})}"
                                   ${gameEnded ? 'disabled' : ''}>
                        </div>
                        <button class="btn-delete" onclick="deletePlayer(${p.id})">🗑</button>
                    </div>
                </div>
            `;
        }).join('');
    }
</script>
</body>
</html>
