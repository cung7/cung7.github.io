<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#e60012">
    
    <title>UNO Punktezähler</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        :root {
            --uno-red: #e60012;
            --uno-yellow: #ffce00;
            --uno-green: #00a651;
            --uno-blue: #0066b3;
            --uno-black: #1a1a1a;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--uno-black);
            color: white;
            text-size-adjust: none;
            height: 100%;
        }
        
        body {
            height: 100%;
            overflow-x: hidden;
        }
        
        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            padding: max(env(safe-area-inset-top), 10px) 12px max(env(safe-area-inset-bottom), 20px) 12px;
        }
        
        /* Header */
        .header {
            background: var(--uno-red);
            margin: -10px -12px 12px -12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 16px 16px;
            box-shadow: 0 4px 12px rgba(230,0,18,0.4);
        }
        
        .header h1 { font-size: 18px; font-weight: 800; text-transform: uppercase; }
        
        .round-badge {
            background: white;
            color: var(--uno-red);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .input-group {
            display: flex;
            flex: 1;
            background: #2a2a2a;
            border-radius: 10px;
            padding: 4px;
            border: 2px solid #333;
        }
        
        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 8px 10px;
            font-size: 16px;
            outline: none;
        }
        
        .btn {
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.1s, opacity 0.2s;
        }
        
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-icon {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--uno-green);
            color: white;
            font-size: 20px;
        }
        
        .btn-target {
            background: var(--uno-yellow);
            color: black;
            padding: 0 14px;
            font-weight: 700;
        }
        
        /* Player List */
        .players-container {
            flex: 1;
            overflow-y: auto;
            margin: 0 -4px;
            padding: 0 4px;
        }
        
        .player-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .player-row {
            display: grid;
            grid-template-columns: 1fr 70px 90px 44px;
            align-items: center;
            gap: 8px;
            background: #2a2a2a;
            padding: 10px;
            border-radius: 12px;
            border-left: 4px solid;
            min-height: 60px;
        }
        
        .player-row:nth-child(4n+1) { border-left-color: var(--uno-red); }
        .player-row:nth-child(4n+2) { border-left-color: var(--uno-yellow); }
        .player-row:nth-child(4n+3) { border-left-color: var(--uno-green); }
        .player-row:nth-child(4n+4) { border-left-color: var(--uno-blue); }
        
        .player-row.winner {
            background: linear-gradient(90deg, rgba(230,0,18,0.2), #2a2a2a);
            box-shadow: 0 0 15px rgba(230,0,18,0.5);
        }
        
        .player-name {
            font-weight: 700;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: none;
            border: none;
            color: white;
            text-align: left;
            cursor: pointer;
            padding: 4px;
        }
        
        .player-name:active { color: #ccc; }
        
        .player-total {
            font-size: 18px;
            font-weight: 800;
            text-align: right;
            font-family: ui-monospace, SF Mono, monospace;
        }
        
        .player-row:nth-child(4n+1) .player-total { color: var(--uno-red); }
        .player-row:nth-child(4n+2) .player-total { color: var(--uno-yellow); }
        .player-row:nth-child(4n+3) .player-total { color: var(--uno-green); }
        .player-row:nth-child(4n+4) .player-total { color: #5aaaff; }
        
        .points-input {
            width: 100%;
            padding: 10px 6px;
            border: 2px solid #444;
            border-radius: 8px;
            text-align: center;
            font-size: 17px;
            font-weight: 700;
            background: #1a1a1a;
            color: white;
            outline: none;
            -webkit-appearance: none;
        }
        
        .points-input:focus {
            border-color: var(--uno-blue);
            background: #111;
        }
        
        .points-input::placeholder { color: #555; }
        
        .btn-delete {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-delete:active { background: var(--uno-red); color: white; }
        
        /* Action Bar */
        .action-bar {
            display: flex;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid #333;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn-action {
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        .btn-undo { background: var(--uno-yellow); color: black; display: none; }
        .btn-hist { background: var(--uno-blue); color: white; }
        .btn-rank { background: var(--uno-green); color: white; }
        .btn-new { background: #444; color: white; }
        
        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-box {
            background: white;
            color: black;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 900;
            color: var(--uno-red);
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .input-block {
            margin: 16px 0;
        }
        
        .input-block label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .input-block input {
            width: 100%;
            padding: 16px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            border: 3px solid #ddd;
            border-radius: 12px;
            outline: none;
        }
        
        .input-block input:focus {
            border-color: var(--uno-red);
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }
        
        .modal-btn.cancel { background: #eee; color: #333; }
        .modal-btn.confirm { background: var(--uno-red); color: white; }
        
        /* History Table */
        .history-scroll {
            overflow-x: auto;
            margin: 0 -12px;
            padding: 0 12px;
        }
        
        .hist-table {
            width: auto;
            min-width: 100%;
            border-collapse: separate;
            border-spacing: 2px;
            font-size: 13px;
        }
        
        .hist-table th, .hist-table td {
            padding: 6px 8px;
            text-align: center;
            white-space: nowrap;
        }
        
        .hist-table th {
            background: var(--uno-red);
            color: white;
            font-weight: 700;
            border-radius: 6px;
        }
        
        .hist-table td {
            background: #f0f0f0;
            border-radius: 4px;
        }
        
        .hist-table .player-cell {
            background: #333;
            color: white;
            font-weight: 600;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .hist-table .total-cell {
            background: #111;
            color: white;
            font-weight: 800;
        }
        
        /* Ranking */
        .rank-list {
            list-style: none;
        }
        
        .rank-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            background: #f8f8f8;
            border-radius: 12px;
            border-left: 5px solid;
            animation: slideIn 0.3s ease-out backwards;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .rank-item:nth-child(1) { border-left-color: gold; animation-delay: 0s; }
        .rank-item:nth-child(2) { border-left-color: silver; animation-delay: 0.1s; }
        .rank-item:nth-child(3) { border-left-color: #cd7f32; animation-delay: 0.2s; }
        
        .rank-pos {
            width: 32px;
            font-size: 20px;
            font-weight: 900;
            color: #999;
            text-align: center;
        }
        
        .rank-item:nth-child(1) .rank-pos { color: gold; font-size: 24px; }
        .rank-item:nth-child(2) .rank-pos { color: silver; font-size: 22px; }
        .rank-item:nth-child(3) .rank-pos { color: #cd7f32; }
        
        .rank-name { flex: 1; font-weight: 700; font-size: 16px; margin: 0 12px; }
        .rank-score { font-size: 20px; font-weight: 900; color: var(--uno-red); }
        
        .empty { text-align: center; color: #666; padding: 40px; }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-btn:active { background: var(--uno-red); }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>🃏 UNO ZÄHLER</h1>
            <div class="round-badge">Runde <span id="roundNum">1</span></div>
        </header>
        
        <div class="controls">
            <div class="input-group">
                <input type="text" id="newPlayerName" placeholder="Name..." maxlength="15" autocomplete="off">
                <button class="btn btn-icon" id="btnAddPlayer">➕</button>
            </div>
            <button class="btn btn-target" id="btnTarget">🎯 <span id="targetScore">500</span></button>
        </div>
        
        <div class="players-container">
            <div id="playersList" class="player-list">
                <div class="empty">Spieler hinzufügen...</div>
            </div>
        </div>
        
        <div class="action-bar">
            <button class="btn btn-action btn-undo" id="btnUndo">↩ Rückgängig</button>
            <button class="btn btn-action btn-hist" id="btnHistory">📊 Verlauf</button>
            <button class="btn btn-action btn-rank" id="btnRanking">🏆 Rangliste</button>
            <button class="btn btn-action btn-new" id="btnNewGame">🔄 Neu</button>
        </div>
    </div>

    <!-- Target Score Modal -->
    <div class="modal" id="targetModal">
        <div class="modal-box">
            <div class="modal-title">🎯 Zielpunktzahl</div>
            <div class="input-block">
                <input type="number" id="targetInput" inputmode="numeric" pattern="[0-9]*" placeholder="500" min="100" max="9999">
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="btnTargetCancel">Abbrechen</button>
                <button class="modal-btn confirm" id="btnTargetSave">Speichern</button>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div class="modal" id="historyModal">
        <button class="close-btn" id="btnCloseHistory">✕</button>
        <div class="modal-box" style="max-width: 95vw; width: 95vw;">
            <div class="modal-title">📊 Rundenübersicht</div>
            <div id="historyContent"></div>
        </div>
    </div>

    <!-- Ranking Modal -->
    <div class="modal" id="rankingModal">
        <button class="close-btn" id="btnCloseRanking">✕</button>
        <div class="modal-box">
            <div class="modal-title">🏆 Rangliste</div>
            <ul id="rankingList"></ul>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal" id="confirmModal">
        <div class="modal-box">
            <div class="modal-title" id="confirmTitle">Bestätigen</div>
            <p id="confirmText" style="margin: 16px 0; line-height: 1.5;"></p>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="btnConfirmCancel">Abbrechen</button>
                <button class="modal-btn confirm" id="btnConfirmOk">OK</button>
            </div>
        </div>
    </div>

    <script>
        // State
        const state = {
            players: [],
            targetScore: 500,
            history: [] // Zum Rückgängig machen
        };

        // DOM Elements
        const $ = id => document.getElementById(id);
        
        // Initial Load
        try {
            const saved = localStorage.getItem('unoGame');
            if (saved) {
                const data = JSON.parse(saved);
                state.players = data.players || [];
                state.targetScore = data.targetScore || 500;
                state.history = data.history || [];
            }
        } catch(e) { console.error('Load error', e); }

        const saveToStorage = () => {
            try {
                localStorage.setItem('unoGame', JSON.stringify(state));
            } catch(e) {}
        };

        const getCurrentRound = () => {
            if (!state.players.length) return 1;
            return Math.max(...state.players.map(p => p.rounds?.length || 0), 0) + 1;
        };

        const escapeHtml = (text) => {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        };

        // Render Players
        const renderPlayers = () => {
            const list = $('playersList');
            const roundNum = $('roundNum');
            const btnUndo = $('btnUndo');
            
            roundNum.textContent = getCurrentRound();
            btnUndo.style.display = state.history.length ? 'block' : 'none';
            
            if (!state.players.length) {
                list.innerHTML = '<div class="empty">Spieler hinzufügen...</div>';
                return;
            }
            
            list.innerHTML = state.players.map((p, idx) => {
                const isWinner = p.total >= state.targetScore;
                const colors = ['var(--uno-red)', 'var(--uno-yellow)', 'var(--uno-green)', '#5aaaff'];
                const color = colors[idx % 4];
                
                return `
                    <div class="player-row ${isWinner ? 'winner' : ''}" data-id="${p.id}">
                        <button class="player-name" onclick="editPlayerName(${p.id})" style="color: ${isWinner ? '#fff' : ''}">
                            ${escapeHtml(p.name)}
                        </button>
                        <div class="player-total" style="${isWinner ? 'color:var(--uno-yellow)' : ''}">${p.total}</div>
                        <input type="number" 
                               class="points-input" 
                               data-player="${p.id}"
                               placeholder="0"
                               min="0"
                               inputmode="numeric"
                               pattern="[0-9]*"
                               onkeypress="return event.charCode >= 48 && event.charCode <= 57">
                        <button class="btn-delete" onclick="deletePlayer(${p.id})" aria-label="Löschen">✕</button>
                    </div>
                `;
            }).join('');
            
            // Fokus auf letztes leeres Feld
            setTimeout(() => {
                const inputs = list.querySelectorAll('.points-input');
                const lastFilled = Array.from(inputs).reverse().find(i => i.value === '');
                if (lastFilled) lastFilled.focus();
            }, 50);
        };

        // Add Points (Direct Save)
        const addPoints = (playerId, value) => {
            const num = parseInt(value);
            if (isNaN(num) || num < 0) return false;
            
            const player = state.players.find(p => p.id === playerId);
            if (!player) return false;
            
            if (!player.rounds) player.rounds = [];
            
            // Save to history for undo
            state.history.push({
                playerId: playerId,
                roundIndex: player.rounds.length,
                value: num
            });
            
            player.rounds.push(num);
            player.total = (player.total || 0) + num;
            
            saveToStorage();
            renderPlayers();
            
            // Haptic
            if (navigator.vibrate) navigator.vibrate(40);
            
            // Check winner
            if (player.total >= state.targetScore) {
                setTimeout(showRanking, 100);
            }
            
            return true;
        };

        // Undo
        const undoLast = () => {
            if (!state.history.length) return;
            const last = state.history.pop();
            const player = state.players.find(p => p.id === last.playerId);
            
            if (player && player.rounds && player.rounds.length > last.roundIndex) {
                player.rounds.pop();
                player.total = (player.total || 0) - last.value;
                saveToStorage();
                renderPlayers();
                if (navigator.vibrate) navigator.vibrate([50, 50]);
            }
        };

        // Add Player
        const addPlayer = () => {
            const input = $('newPlayerName');
            const name = input.value.trim();
            
            if (!name) return;
            if (state.players.length >= 8) {
                showConfirm('Maximum erreicht', 'Es können maximal 8 Spieler hinzugefügt werden.', null);
                return;
            }
            
            state.players.push({
                id: Date.now(),
                name: name,
                rounds: [],
                total: 0
            });
            
            input.value = '';
            saveToStorage();
            renderPlayers();
            input.focus();
        };

        // Edit Name
        window.editPlayerName = (id) => {
            const p = state.players.find(x => x.id === id);
            if (!p) return;
            const neu = prompt('Neuer Name:', p.name);
            if (neu && neu.trim()) {
                p.name = neu.trim().substring(0, 20);
                saveToStorage();
                renderPlayers();
            }
        };

        // Delete Player
        window.deletePlayer = (id) => {
            const p = state.players.find(x => x.id === id);
            if (!p) return;
            
            showConfirm('Spieler löschen', `Soll ${escapeHtml(p.name)} wirklich gelöscht werden?`, () => {
                state.players = state.players.filter(x => x.id !== id);
                state.history = state.history.filter(h => h.playerId !== id);
                saveToStorage();
                renderPlayers();
            });
        };

        // Target Score
        const showTargetModal = () => {
            $('targetInput').value = state.targetScore;
            $('targetModal').classList.add('active');
            $('targetInput').focus();
        };

        const saveTarget = () => {
            const val = parseInt($('targetInput').value);
            if (val && val >= 100 && val <= 9999) {
                state.targetScore = val;
                saveToStorage();
                $('targetScore').textContent = val;
                renderPlayers();
            }
            $('targetModal').classList.remove('active');
        };

        // History
        const showHistory = () => {
            const content = $('historyContent');
            const maxRounds = Math.max(...state.players.map(p => p.rounds?.length || 0), 0);
            
            if (!maxRounds) {
                content.innerHTML = '<div class="empty">Noch keine Runden gespielt</div>';
            } else {
                let html = '<div class="history-scroll"><table class="hist-table"><thead><tr>';
                html += '<th>Spieler</th>';
                for (let i = 1; i <= maxRounds; i++) {
                    html += `<th>R${i}</th>`;
                }
                html += '<th class="total-cell">Σ</th></tr></thead><tbody>';
                
                state.players.forEach(p => {
                    html += `<tr><td class="player-cell">${escapeHtml(p.name)}</td>`;
                    for (let i = 0; i < maxRounds; i++) {
                        const val = p.rounds?.[i];
                        html += `<td>${val !== undefined ? val : '-'}</td>`;
                    }
                    html += `<td class="total-cell">${p.total || 0}</td></tr>`;
                });
                
                html += '</tbody></table></div>';
                content.innerHTML = html;
            }
            
            $('historyModal').classList.add('active');
        };

        // Ranking
        const showRanking = () => {
            const list = $('rankingList');
            const sorted = [...state.players].sort((a, b) => (b.total || 0) - (a.total || 0));
            
            list.innerHTML = sorted.map((p, i) => `
                <li class="rank-item">
                    <div class="rank-pos">${i + 1}</div>
                    <div class="rank-name">${escapeHtml(p.name)}</div>
                    <div class="rank-score">${p.total || 0}</div>
                </li>
            `).join('');
            
            $('rankingModal').classList.add('active');
        };

        // Confirm Dialog
        let confirmCallback = null;
        const showConfirm = (title, text, callback) => {
            $('confirmTitle').textContent = title;
            $('confirmText').textContent = text;
            confirmCallback = callback;
            $('confirmModal').classList.add('active');
        };

        const hideConfirm = () => {
            $('confirmModal').classList.remove('active');
            confirmCallback = null;
        };

        // New Game
        const newGame = () => {
            if (!state.players.length) return;
            showConfirm('Neues Spiel?', 'Alle Spieler und Punkte werden gelöscht.', () => {
                state.players = [];
                state.history = [];
                saveToStorage();
                renderPlayers();
                $('newPlayerName').focus();
            });
        };

        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            renderPlayers();
            
            // Inputs
            $('btnAddPlayer').addEventListener('click', addPlayer);
            $('newPlayerName').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addPlayer();
            });
            
            // Points input handling (Event Delegation)
            $('playersList').addEventListener('keypress', (e) => {
                if (e.target.classList.contains('points-input') && e.key === 'Enter') {
                    const id = parseInt(e.target.dataset.player);
                    if (addPoints(id, e.target.value)) {
                        e.target.value = '';
                        // Focus next
                        const inputs = Array.from(document.querySelectorAll('.points-input'));
                        const idx = inputs.indexOf(e.target);
                        const next = inputs[idx + 1] || inputs[0];
                        if (next) next.focus();
                    }
                }
            });
            
            // Blur also saves
            $('playersList').addEventListener('blur', (e) => {
                if (e.target.classList.contains('points-input') && e.target.value !== '') {
                    const id = parseInt(e.target.dataset.player);
                    if (addPoints(id, e.target.value)) {
                        e.target.value = '';
                    }
                }
            }, true);
            
            // Buttons
            $('btnTarget').addEventListener('click', showTargetModal);
            $('btnTargetSave').addEventListener('click', saveTarget);
            $('btnTargetCancel').addEventListener('click', () => $('targetModal').classList.remove('active'));
            
            $('btnUndo').addEventListener('click', undoLast);
            $('btnHistory').addEventListener('click', showHistory);
            $('btnCloseHistory').addEventListener('click', () => $('historyModal').classList.remove('active'));
            
            $('btnRanking').addEventListener('click', showRanking);
            $('btnCloseRanking').addEventListener('click', () => $('rankingModal').classList.remove('active'));
            
            $('btnNewGame').addEventListener('click', newGame);
            
            $('btnConfirmCancel').addEventListener('click', hideConfirm);
            $('btnConfirmOk').addEventListener('click', () => {
                if (confirmCallback) confirmCallback();
                hideConfirm();
            });
            
            // Escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                    undoLast();
                }
            });
            
            // Target input enter
            $('targetInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveTarget();
            });
        });
        
        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(console.log);
        }
    </script>
</body>
</html>
