<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#e60012">
    <meta name="description" content="Offline-fähiger Punktezähler für UNO">
    
    <title>UNO Punktezähler</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23e60012' rx='15' width='100' height='100'/><text y='.9em' x='50%' text-anchor='middle' fill='white' font-size='70'>🃏</text></svg>">
    
    <style>
        :root {
            --uno-red: #e60012;
            --uno-yellow: #ffce00;
            --uno-green: #00a651;
            --uno-blue: #0066b3;
            --uno-black: #1a1a1a;
            --uno-dark: #111;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        html {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--uno-black);
            color: white;
            text-size-adjust: none;
        }
        
        body {
            min-height: 100dvh;
            min-height: -webkit-fill-available;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .app {
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            padding: max(var(--safe-top), 12px) 12px max(var(--safe-bottom), 20px) 12px;
        }
        
        /* Header kompakter */
        .header {
            background: var(--uno-red);
            margin: -12px -12px 12px -12px;
            padding: 12px 16px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 15px rgba(230, 0, 18, 0.4);
        }
        
        .header h1 {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .round-badge {
            background: white;
            color: var(--uno-red);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }
        
        /* Controls */
        .controls-top {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .input-group {
            display: flex;
            gap: 6px;
            flex: 1;
            background: #222;
            border-radius: 10px;
            padding: 6px;
            border: 2px solid #333;
        }
        
        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 6px;
            outline: none;
        }
        
        .btn {
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s;
            touch-action: manipulation;
            font-size: 14px;
        }
        
        .btn:active { transform: scale(0.96); }
        
        .btn-icon {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-add { background: var(--uno-green); color: white; }
        .btn-target { background: var(--uno-yellow); color: black; padding: 0 12px; font-weight: 700; }
        
        /* Kompakte Player Liste */
        .players-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 10px;
        }
        
        .players-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .player-row {
            display: grid;
            grid-template-columns: 1fr 70px 90px 36px;
            align-items: center;
            gap: 10px;
            background: #222;
            padding: 10px 12px;
            border-radius: 12px;
            border-left: 4px solid;
            position: relative;
        }
        
        .player-row[data-color="0"] { border-left-color: var(--uno-red); }
        .player-row[data-color="1"] { border-left-color: var(--uno-yellow); }
        .player-row[data-color="2"] { border-left-color: var(--uno-green); }
        .player-row[data-color="3"] { border-left-color: var(--uno-blue); }
        
        .player-row.winner {
            background: linear-gradient(90deg, #222 0%, rgba(230,0,18,0.2) 100%);
            animation: pulseWinner 2s infinite;
        }
        
        @keyframes pulseWinner {
            0%, 100% { box-shadow: 0 0 0 rgba(230,0,18,0.4); }
            50% { box-shadow: 0 0 15px rgba(230,0,18,0.6); }
        }
        
        .player-name {
            font-weight: 700;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: none;
            border: none;
            color: white;
            text-align: left;
            cursor: pointer;
            padding: 4px;
            margin: -4px;
            border-radius: 6px;
        }
        
        .player-name:hover { background: rgba(255,255,255,0.1); }
        
        .player-total {
            font-size: 18px;
            font-weight: 900;
            text-align: right;
            font-family: 'SF Mono', monospace;
        }
        
        .player-row[data-color="0"] .player-total { color: var(--uno-red); }
        .player-row[data-color="1"] .player-total { color: var(--uno-yellow); }
        .player-row[data-color="2"] .player-total { color: var(--uno-green); }
        .player-row[data-color="3"] .player-total { color: #4a9eff; }
        
        .player-input {
            width: 100%;
            padding: 8px 6px;
            border: 2px solid #444;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            background: #333;
            color: white;
            outline: none;
            -webkit-appearance: none;
        }
        
        .player-input:focus {
            border-color: var(--uno-blue);
            background: #3a3a3a;
        }
        
        .player-input::-webkit-inner-spin-button,
        .player-input::-webkit-outer-spin-button { display: none; }
        
        .btn-delete {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .btn-delete:hover { background: rgba(230,0,18,0.3); color: white; }
        
        /* Action Bar */
        .action-bar {
            position: sticky;
            bottom: 0;
            background: rgba(17,17,17,0.98);
            backdrop-filter: blur(20px);
            padding: 12px 0;
            margin: 0 -12px;
            border-top: 1px solid #333;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            padding-bottom: max(12px, var(--safe-bottom));
        }
        
        .btn-uno {
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }
        
        .btn-undo { background: var(--uno-yellow); color: black; }
        .btn-hist { background: var(--uno-blue); color: white; }
        .btn-new { background: #444; color: white; }
        .btn-rank { background: var(--uno-green); color: white; }
        
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal-content {
            background: white;
            color: black;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalPop 0.2s ease-out;
        }
        
        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 3px solid var(--uno-red);
            padding-bottom: 10px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 900;
            color: var(--uno-red);
            text-transform: uppercase;
        }
        
        .btn-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--uno-red);
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        
        /* Numeric Input Modal */
        .num-input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        
        .num-input-group input {
            font-size: 32px;
            padding: 16px;
            text-align: center;
            border: 3px solid #ddd;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
        }
        
        .num-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .num-btn {
            aspect-ratio: 1.5;
            font-size: 24px;
            font-weight: bold;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .num-btn:active { background: var(--uno-red); color: white; border-color: var(--uno-red); }
        
        /* Compact History Table - TRANSPONED */
        .hist-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 2px;
            font-size: 12px;
        }
        
        .hist-table th, .hist-table td {
            padding: 6px 4px;
            text-align: center;
            border-radius: 4px;
        }
        
        .hist-table th {
            background: var(--uno-red);
            color: white;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        
        .hist-table td {
            background: #f5f5f5;
            font-weight: 600;
            min-width: 30px;
        }
        
        .hist-table .player-col {
            background: var(--uno-black);
            color: white;
            text-align: left;
            padding-left: 8px;
            min-width: 80px;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .hist-table .total-col {
            background: var(--uno-black);
            color: white;
            font-weight: 900;
        }
        
        /* Ranking */
        .rank-list {
            list-style: none;
            counter-reset: rank;
        }
        
        .rank-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            background: #f8f8f8;
            border-radius: 12px;
            border-left: 4px solid var(--uno-red);
            animation: slideIn 0.3s ease-out;
            animation-fill-mode: both;
        }
        
        .rank-item:nth-child(1) { border-left-color: gold; background: linear-gradient(90deg, #fff9e6 0%, white 100%); animation-delay: 0s; }
        .rank-item:nth-child(2) { border-left-color: silver; background: linear-gradient(90deg, #f0f0f0 0%, white 100%); animation-delay: 0.1s; }
        .rank-item:nth-child(3) { border-left-color: #cd7f32; background: linear-gradient(90deg, #fff4e6 0%, white 100%); animation-delay: 0.2s; }
        
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .rank-number {
            font-size: 24px;
            font-weight: 900;
            color: #999;
            width: 30px;
            text-align: center;
        }
        
        .rank-item:nth-child(1) .rank-number { color: gold; font-size: 28px; }
        .rank-item:nth-child(2) .rank-number { color: silver; font-size: 26px; }
        .rank-item:nth-child(3) .rank-number { color: #cd7f32; font-size: 24px; }
        
        .rank-name { flex: 1; font-weight: 700; font-size: 16px; }
        .rank-score { font-size: 20px; font-weight: 900; color: var(--uno-red); }
        
        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px 20px;
        }
        
        .confirm-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 16px;
        }
        
        .btn-secondary {
            background: #eee;
            color: #333;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
        }
        
        .btn-primary {
            background: var(--uno-red);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
        }
        
        @media (max-width: 380px) {
            .player-row { grid-template-columns: 1fr 60px 80px 32px; gap: 6px; padding: 8px; }
            .player-name { font-size: 13px; }
            .player-total { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>🃏 UNO ZÄHLER</h1>
            <div class="round-badge">Runde <span id="cRound">1</span></div>
        </header>
        
        <div class="controls-top">
            <div class="input-group">
                <input type="text" id="pName" placeholder="Name..." maxlength="15" enterkeyhint="done" autocomplete="off">
                <button class="btn btn-icon btn-add" id="btnAdd">➕</button>
            </div>
            <button class="btn btn-target" id="btnTarget">🎯 <span id="targetDisplay">500</span></button>
        </div>
        
        <main class="players-container">
            <div class="players-list" id="playersList">
                <div class="empty-state">Spieler hinzufügen ➕</div>
            </div>
        </main>
        
        <nav class="action-bar">
            <button class="btn btn-uno btn-undo" id="btnUndo" style="display:none;">↩ Undo</button>
            <button class="btn btn-uno btn-hist" id="btnHist">📊 Verlauf</button>
            <button class="btn btn-uno btn-rank" id="btnRank">🏆 Rangliste</button>
            <button class="btn btn-uno btn-new" id="btnNew">🔄 Neu</button>
        </nav>
    </div>

    <!-- Target Modal mit Nummernblock -->
    <div class="modal-overlay" id="targetModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">🎯 Zielpunktzahl</div>
                <button class="btn-close" id="btnCloseTarget">✕</button>
            </div>
            <div class="num-input-group">
                <input type="number" id="targetInput" inputmode="numeric" pattern="[0-9]*" readonly>
                <div class="num-pad">
                    <button class="num-btn" data-num="1">1</button>
                    <button class="num-btn" data-num="2">2</button>
                    <button class="num-btn" data-num="3">3</button>
                    <button class="num-btn" data-num="4">4</button>
                    <button class="num-btn" data-num="5">5</button>
                    <button class="num-btn" data-num="6">6</button>
                    <button class="num-btn" data-num="7">7</button>
                    <button class="num-btn" data-num="8">8</button>
                    <button class="num-btn" data-num="9">9</button>
                    <button class="num-btn" data-num="C" style="background:#ffebee;color:var(--uno-red);">C</button>
                    <button class="num-btn" data-num="0">0</button>
                    <button class="num-btn" data-num="OK" style="background:var(--uno-green);color:white;">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div class="modal-overlay" id="histModal">
        <div class="modal-content" style="max-width: 95vw;">
            <div class="modal-header">
                <div class="modal-title">📊 Verlauf</div>
                <button class="btn-close" id="btnCloseHist">✕</button>
            </div>
            <div id="histTable"></div>
        </div>
    </div>

    <!-- Ranking Modal -->
    <div class="modal-overlay" id="rankModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">🏆 Rangliste</div>
                <button class="btn-close" id="btnCloseRank">✕</button>
            </div>
            <ul class="rank-list" id="rankList"></ul>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="confirmTitle">Bestätigen</div>
            </div>
            <p id="confirmText"></p>
            <div class="confirm-actions">
                <button class="btn-secondary" id="btnCancel">Abbrechen</button>
                <button class="btn-primary" id="btnConfirm">OK</button>
            </div>
        </div>
    </div>

    <script>
        const UNOApp = (() => {
            const state = {
                players: [],
                targetScore: 500,
                undoStack: []
            };
            
            const DOM = {
                list: document.getElementById('playersList'),
                roundDisplay: document.getElementById('cRound'),
                targetDisplay: document.getElementById('targetDisplay'),
                input: document.getElementById('pName'),
                btnAdd: document.getElementById('btnAdd'),
                btnUndo: document.getElementById('btnUndo'),
                btnHist: document.getElementById('btnHist'),
                btnRank: document.getElementById('btnRank'),
                btnNew: document.getElementById('btnNew'),
                btnTarget: document.getElementById('btnTarget'),
                targetModal: document.getElementById('targetModal'),
                targetInput: document.getElementById('targetInput'),
                histModal: document.getElementById('histModal'),
                histTable: document.getElementById('histTable'),
                rankModal: document.getElementById('rankModal'),
                rankList: document.getElementById('rankList'),
                confirmModal: document.getElementById('confirmModal'),
                confirmText: document.getElementById('confirmText'),
            };
            
            let confirmCallback = null;
            let currentTargetTemp = '';
            
            const escapeHTML = (str) => {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            };
            
            const vibrate = (pattern) => {
                if (navigator.vibrate) navigator.vibrate(pattern);
            };
            
            const Storage = {
                save() {
                    try { localStorage.setItem('unoGame_v3', JSON.stringify(state)); } catch(e) {}
                },
                load() {
                    try {
                        const data = localStorage.getItem('unoGame_v3');
                        if (data) {
                            const parsed = JSON.parse(data);
                            state.players = parsed.players || [];
                            state.targetScore = parsed.targetScore || 500;
                            state.undoStack = parsed.undoStack || [];
                        }
                    } catch(e) {}
                },
                clear() {
                    try { localStorage.removeItem('unoGame_v3'); } catch(e) {}
                }
            };
            
            const getCurrentRound = () => {
                if (state.players.length === 0) return 1;
                return Math.max(...state.players.map(p => p.rounds.length), 0) + 1;
            };
            
            const updateUI = () => {
                DOM.roundDisplay.textContent = getCurrentRound();
                DOM.targetDisplay.textContent = state.targetScore;
                DOM.btnUndo.style.display = state.undoStack.length ? 'block' : 'none';
                
                if (state.players.length === 0) {
                    DOM.list.innerHTML = '<div class="empty-state">Spieler hinzufügen ➕</div>';
                    return;
                }
                
                DOM.list.innerHTML = state.players.map((p, i) => {
                    const isWinner = p.total >= state.targetScore;
                    return `
                        <div class="player-row ${isWinner ? 'winner' : ''}" data-color="${i % 4}" data-id="${p.id}">
                            <button class="player-name" data-action="edit" data-id="${p.id}">${escapeHTML(p.name)}</button>
                            <div class="player-total">${p.total}</div>
                            <input type="number" 
                                   class="player-input" 
                                   data-id="${p.id}"
                                   placeholder="0"
                                   min="0"
                                   inputmode="numeric"
                                   pattern="[0-9]*"
                                   enterkeyhint="done"
                                   onkeypress="return event.charCode >= 48 && event.charCode <= 57">
                            <button class="btn-delete" data-action="delete" data-id="${p.id}">✕</button>
                        </div>
                    `;
                }).join('');
                
                // Fokus auf erstes leeres Feld
                const inputs = DOM.list.querySelectorAll('.player-input');
                if (inputs.length > 0) inputs[inputs.length - 1].focus();
            };
            
            const addPoints = (playerId, value) => {
                const player = state.players.find(p => p.id === playerId);
                if (!player || value < 0 || isNaN(value)) return false;
                
                // Save to undo
                state.undoStack.push({
                    playerId,
                    prevTotal: player.total,
                    roundIdx: player.rounds.length
                });
                
                player.rounds.push(value);
                player.total += value;
                Storage.save();
                updateUI();
                vibrate([40]);
                
                if (player.total >= state.targetScore) {
                    setTimeout(() => showRanking(true), 100);
                }
                return true;
            };
            
            const undo = () => {
                if (!state.undoStack.length) return;
                const last = state.undoStack.pop();
                const player = state.players.find(p => p.id === last.playerId);
                if (player) {
                    player.rounds.pop();
                    player.total = last.prevTotal;
                    Storage.save();
                    updateUI();
                    vibrate([50, 50]);
                }
            };
            
            const showTargetModal = () => {
                currentTargetTemp = state.targetScore.toString();
                DOM.targetInput.value = currentTargetTemp;
                DOM.targetModal.classList.add('active');
                vibrate([30]);
            };
            
            const hideTargetModal = () => {
                DOM.targetModal.classList.remove('active');
            };
            
            const handleNumPad = (num) => {
                if (num === 'C') {
                    currentTargetTemp = '';
                } else if (num === 'OK') {
                    const val = parseInt(currentTargetTemp);
                    if (val > 0) {
                        state.targetScore = val;
                        Storage.save();
                        updateUI();
                        hideTargetModal();
                        vibrate([50]);
                    }
                } else {
                    if (currentTargetTemp.length < 4) {
                        currentTargetTemp += num;
                    }
                }
                DOM.targetInput.value = currentTargetTemp;
            };
            
            const showHistory = () => {
                const maxRounds = Math.max(...state.players.map(p => p.rounds.length), 0);
                
                if (maxRounds === 0) {
                    DOM.histTable.innerHTML = '<p style="text-align:center;color:#666;">Noch keine Runden</p>';
                } else {
                    // TRANSPONED: Zeilen = Spieler, Spalten = Runden
                    let html = '<div style="overflow-x:auto;"><table class="hist-table"><thead><tr><th>Spieler</th>';
                    for (let r = 1; r <= maxRounds; r++) {
                        html += `<th>${r}</th>`;
                    }
                    html += '<th class="total-col">Σ</th></tr></thead><tbody>';
                    
                    state.players.forEach(p => {
                        html += `<tr><td class="player-col" title="${escapeHTML(p.name)}">${escapeHTML(p.name)}</td>`;
                        for (let r = 0; r < maxRounds; r++) {
                            const val = p.rounds[r] || 0;
                            const display = val === 0 ? '-' : val;
                            html += `<td>${display}</td>`;
                        }
                        html += `<td class="total-col">${p.total}</td></tr>`;
                    });
                    html += '</tbody></table></div>';
                    DOM.histTable.innerHTML = html;
                }
                DOM.histModal.classList.add('active');
            };
            
            const showRanking = (isWinnerScreen = false) => {
                const sorted = [...state.players].sort((a, b) => b.total - a.total);
                
                DOM.rankList.innerHTML = sorted.map((p, i) => `
                    <li class="rank-item">
                        <div class="rank-number">${i + 1}</div>
                        <div class="rank-name">${escapeHTML(p.name)}</div>
                        <div class="rank-score">${p.total}</div>
                    </li>
                `).join('');
                
                DOM.rankModal.classList.add('active');
                
                if (isWinnerScreen) {
                    vibrate([100, 50, 100, 50, 300]);
                }
            };
            
            const showConfirm = (text, callback) => {
                DOM.confirmText.textContent = text;
                confirmCallback = callback;
                DOM.confirmModal.classList.add('active');
            };
            
            const hideConfirm = () => {
                DOM.confirmModal.classList.remove('active');
                confirmCallback = null;
            };
            
            const addPlayer = () => {
                const name = DOM.input.value.trim();
                if (!name) return;
                if (state.players.length >= 8) {
                    showConfirm('Maximum 8 Spieler', null);
                    return;
                }
                state.players.push({
                    id: Date.now(),
                    name,
                    rounds: [],
                    total: 0
                });
                DOM.input.value = '';
                Storage.save();
                updateUI();
                vibrate(40);
            };
            
            const deletePlayer = (id) => {
                const p = state.players.find(x => x.id === id);
                if (!p) return;
                showConfirm(`${escapeHTML(p.name)} löschen?`, () => {
                    state.players = state.players.filter(x => x.id !== id);
                    // Cleanup undo stack
                    state.undoStack = state.undoStack.filter(u => u.playerId !== id);
                    Storage.save();
                    updateUI();
                });
            };
            
            const editName = (id) => {
                const p = state.players.find(x => x.id === id);
                if (!p) return;
                const neu = prompt('Neuer Name:', p.name);
                if (neu && neu.trim()) {
                    p.name = neu.trim().substring(0, 20);
                    Storage.save();
                    updateUI();
                }
            };
            
            const newGame = () => {
                if (state.players.length === 0) return;
                showConfirm('Wirklich alles löschen?', () => {
                    state.players = [];
                    state.undoStack = [];
                    Storage.clear();
                    updateUI();
                    DOM.input.focus();
                });
            };
            
            const bindEvents = () => {
                // List interactions
                DOM.list.addEventListener('click', (e) => {
                    const btn = e.target.closest('button[data-action]');
                    if (!btn) return;
                    const id = parseInt(btn.dataset.id);
                    if (btn.dataset.action === 'delete') deletePlayer(id);
                    if (btn.dataset.action === 'edit') editName(id);
                });
                
                // Direct input save on Enter
                DOM.list.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && e.target.classList.contains('player-input')) {
                        e.preventDefault();
                        const id = parseInt(e.target.dataset.id);
                        const val = parseInt(e.target.value) || 0;
                        if (addPoints(id, val)) {
                            e.target.value = '';
                            // Move to next player
                            const inputs = Array.from(DOM.list.querySelectorAll('.player-input'));
                            const idx = inputs.indexOf(e.target);
                            const next = inputs[idx + 1] || inputs[0];
                            if (next) next.focus();
                        }
                    }
                });
                
                // Optional: Save on blur (if user clicks away)
                DOM.list.addEventListener('blur', (e) => {
                    if (e.target.classList.contains('player-input') && e.target.value !== '') {
                        const id = parseInt(e.target.dataset.id);
                        const val = parseInt(e.target.value) || 0;
                        if (addPoints(id, val)) {
                            e.target.value = '';
                        }
                    }
                }, true);
                
                // Controls
                DOM.btnAdd.addEventListener('click', addPlayer);
                DOM.input.addEventListener('keypress', (e) => { if (e.key === 'Enter') addPlayer(); });
                DOM.btnTarget.addEventListener('click', showTargetModal);
                DOM.btnCloseTarget.addEventListener('click', hideTargetModal);
                
                // Numpad
                document.querySelectorAll('.num-btn').forEach(btn => {
                    btn.addEventListener('click', () => handleNumPad(btn.dataset.num));
                });
                
                DOM.btnUndo.addEventListener('click', undo);
                DOM.btnHist.addEventListener('click', showHistory);
                DOM.btnCloseHist.addEventListener('click', () => DOM.histModal.classList.remove('active'));
                DOM.btnRank.addEventListener('click', () => showRanking(false));
                DOM.btnCloseRank.addEventListener('click', () => DOM.rankModal.classList.remove('active'));
                DOM.btnNew.addEventListener('click', newGame);
                
                DOM.btnConfirm.addEventListener('click', () => {
                    if (confirmCallback) confirmCallback();
                    hideConfirm();
                });
                DOM.btnCancel.addEventListener('click', hideConfirm);
                
                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
                    }
                    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                        e.preventDefault();
                        undo();
                    }
                });
                
                // SW
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('./sw.js').catch(console.error);
                }
            };
            
            const init = () => {
                Storage.load();
                bindEvents();
                updateUI();
                DOM.input.focus();
            };
            
            return { init };
        })();
        
        document.addEventListener('DOMContentLoaded', UNOApp.init);
    </script>
</body>
</html>
