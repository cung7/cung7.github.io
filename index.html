<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#e60012">
    <title>UNO Punktezähler</title>
    <link rel="manifest" href="./manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('SW OK'))
                .catch(err => console.log('Fehler:', err));
        }
    </script>
    <style>
        :root {
            --uno-red: #e60012;
            --uno-yellow: #ffce00;
            --uno-green: #00a651;
            --uno-blue: #0066b3;
            --uno-black: #1a1a1a;
            --uno-dark: #111;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--uno-black);
            color: white;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .app {
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            padding: env(safe-area-inset-top, 10px) 12px env(safe-area-inset-bottom, 20px) 12px;
        }

        /* UNO HEADER */
        .header {
            background: var(--uno-red);
            margin: -12px -12px 15px -12px;
            padding: 15px 20px 20px 20px;
            text-align: center;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 15px rgba(230, 0, 18, 0.4);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255,255,255,0.05) 10px,
                rgba(255,255,255,0.05) 20px
            );
            pointer-events: none;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
            position: relative;
        }
        .round-badge {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            color: var(--uno-red);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* STEUERUNG */
        .controls-top {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .input-group {
            display: flex;
            gap: 8px;
            flex: 1;
            min-width: 200px;
            background: #222;
            border-radius: 12px;
            padding: 8px;
            border: 2px solid #333;
        }
        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 8px;
            outline: none;
        }
        .input-group input::placeholder { color: #666; }
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-add { background: var(--uno-green); color: white; }
        .btn-target {
            background: var(--uno-yellow);
            color: black;
            font-weight: bold;
            padding: 0 15px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            min-width: 80px;
        }

        /* SPIELER GRID */
        .players-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 10px;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        /* UNO KARTEN STIL */
        .player-card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            color: black;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 4px solid;
            transition: transform 0.2s;
        }
        .player-card:active { transform: scale(0.98); }
        
        /* Abwechselnde UNO Farben */
        .player-card:nth-child(4n+1) { border-color: var(--uno-red); }
        .player-card:nth-child(4n+2) { border-color: var(--uno-yellow); }
        .player-card:nth-child(4n+3) { border-color: var(--uno-green); }
        .player-card:nth-child(4n+4) { border-color: var(--uno-blue); }
        
        .player-card.winner {
            animation: unoWin 1s infinite;
            border-width: 6px;
        }
        @keyframes unoWin {
            0%, 100% { border-color: var(--uno-red); box-shadow: 0 0 20px var(--uno-red); }
            25% { border-color: var(--uno-yellow); box-shadow: 0 0 20px var(--uno-yellow); }
            50% { border-color: var(--uno-green); box-shadow: 0 0 20px var(--uno-green); }
            75% { border-color: var(--uno-blue); box-shadow: 0 0 20px var(--uno-blue); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .card-name {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-delete {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.5;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-delete:active { opacity: 1; }

        .card-score {
            font-size: 36px;
            font-weight: 900;
            text-align: center;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
        }
        
        /* Farben für Score je nach Kartenfarbe */
        .player-card:nth-child(4n+1) .card-score { color: var(--uno-red); }
        .player-card:nth-child(4n+2) .card-score { color: #cc9900; }
        .player-card:nth-child(4n+3) .card-score { color: var(--uno-green); }
        .player-card:nth-child(4n+4) .card-score { color: var(--uno-blue); }

        .card-input {
            width: 100%;
            padding: 10px;
            border: 3px solid #ddd;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: black;
            background: #f5f5f5;
            outline: none;
            -webkit-appearance: none;
        }
        .card-input:focus {
            border-color: var(--uno-blue);
            background: white;
        }

        /* ACTION BUTTONS */
        .action-bar {
            position: sticky;
            bottom: 0;
            background: rgba(17,17,17,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            margin: 0 -12px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-uno {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        .btn-save { background: var(--uno-red); color: white; }
        .btn-undo { background: var(--uno-yellow); color: black; }
        .btn-hist { background: var(--uno-blue); color: white; }
        .btn-new { background: #444; color: white; }

        /* MODALS */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
        }
        .modal.show { display: block; }
        .modal-content {
            background: white;
            color: black;
            border-radius: 20px;
            padding: 20px;
            max-width: 500px;
            margin: 20px auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 3px solid var(--uno-red);
            padding-bottom: 10px;
        }
        .modal-title {
            font-size: 24px;
            font-weight: 900;
            color: var(--uno-red);
            text-transform: uppercase;
        }
        .btn-close {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--uno-red);
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        /* TABELLE */
        .hist-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 4px;
            font-size: 14px;
        }
        .hist-table th {
            background: var(--uno-red);
            color: white;
            padding: 10px;
            border-radius: 8px;
        }
        .hist-table td {
            background: #f0f0f0;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            font-weight: 600;
        }
        .hist-table .sum td {
            background: var(--uno-black);
            color: white;
            font-weight: 900;
        }

        .winner-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--uno-red);
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
        }
        .winner-modal.show { display: flex; }
        .winner-uno {
            font-size: 60px;
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
            margin-bottom: 20px;
            transform: rotate(-5deg);
        }
        .winner-text {
            font-size: 48px;
            font-weight: 900;
            color: var(--uno-yellow);
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
        }
        .winner-name {
            font-size: 36px;
            color: white;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .empty {
            text-align: center;
            color: #666;
            padding: 40px;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
<div class="app">

    <div class="header">
        <h1>🃏 UNO ZÄHLER</h1>
        <div class="round-badge">Runde <span id="cRound">1</span></div>
    </div>

    <div class="controls-top">
        <div class="input-group">
            <input type="text" id="pName" placeholder="Spielername..." maxlength="15" enterkeyhint="done">
            <button class="btn-icon btn-add" onclick="addPlayer()">➕</button>
        </div>
        <button class="btn-target" onclick="setTarget()">🎯 Ziel</button>
    </div>

    <div class="players-container">
        <div class="players-grid" id="playersGrid">
            <div class="empty">Füge Spieler mit ➕ hinzu</div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn-uno btn-save" onclick="saveRound()">💾 Runde Speichern</button>
        <button class="btn-uno btn-undo" onclick="undoRound()" id="undoBtn" style="display:none;">↩ Undo</button>
        <button class="btn-uno btn-hist" onclick="showHistory()" id="histBtn" style="display:none;">📊 Verlauf</button>
        <button class="btn-uno btn-new" onclick="newGame()">🔄 Neu</button>
    </div>

</div>

<!-- History Modal -->
<div class="modal" id="histModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">📊 Rundenübersicht</div>
            <button class="btn-close" onclick="closeHistory()">✕</button>
        </div>
        <div id="histTable"></div>
    </div>
</div>

<!-- Winner Modal -->
<div class="winner-modal" id="winModal">
    <div class="winner-uno">UNO!</div>
    <div class="winner-text">Gewinner!</div>
    <div class="winner-name" id="winName"></div>
    <button class="btn-uno btn-save" onclick="newGame()" style="font-size:20px;">Neues Spiel</button>
    <button onclick="closeWinner()" style="margin-top:15px;background:none;border:2px solid white;color:white;padding:10px 30px;border-radius:30px;font-size:16px;cursor:pointer;">Weiterspielen</button>
</div>

<script>
    let players = [];
    let currentRound = 1;
    let targetScore = 500; // UNO Standard
    let undoStack = [];

    window.onload = () => {
        const s = localStorage.getItem('unoGame');
        if (s) {
            const d = JSON.parse(s);
            players = d.players || [];
            currentRound = d.currentRound || 1;
            targetScore = d.target || 500;
            undoStack = d.undoStack || [];
            updateUI();
        }
    };

    function saveData() {
        localStorage.setItem('unoGame', JSON.stringify({
            players, currentRound, targetScore, undoStack
        }));
    }

    function addPlayer() {
        const inp = document.getElementById('pName');
        const name = inp.value.trim();
        if (!name) return;
        
        players.push({
            id: Date.now(),
            name: name,
            rounds: [],
            total: 0
        });
        
        inp.value = '';
        inp.focus();
        saveData();
        updateUI();
    }

    document.getElementById('pName').addEventListener('keypress', e => {
        if (e.key === 'Enter') addPlayer();
    });

    function setTarget() {
        const t = prompt('Zielpunktzahl (Standard UNO: 500):', targetScore);
        if (t && !isNaN(t)) {
            targetScore = parseInt(t);
            saveData();
            alert('Ziel: ' + targetScore + ' Punkte');
        }
    }

    function saveRound() {
        const inputs = document.querySelectorAll('.p-input');
        const snapshot = [];
        let hasValue = false;

        inputs.forEach((inp, idx) => {
            const val = inp.value.trim();
            const pts = val === '' ? 0 : parseInt(val);
            if (val !== '') hasValue = true;
            snapshot.push({ 
                id: players[idx].id, 
                pts, 
                prev: players[idx].total 
            });
        });

        if (!hasValue) {
            alert('Bitte mindestens einen Wert eingeben');
            return;
        }

        undoStack.push({ round: currentRound, data: snapshot });
        
        snapshot.forEach((item, idx) => {
            players[idx].rounds.push(item.pts);
            players[idx].total += item.pts;
        });

        currentRound++;
        saveData();
        updateUI();

        // Gewinner prüfen
        const winner = players.find(p => p.total >= targetScore);
        if (winner) {
            document.getElementById('winName').textContent = winner.name;
            document.getElementById('winModal').classList.add('show');
        }
    }

    function undoRound() {
        if (!undoStack.length) return;
        const last = undoStack.pop();
        currentRound = last.round;
        
        last.data.forEach(item => {
            const p = players.find(x => x.id === item.id);
            if (p) {
                p.rounds.pop();
                p.total = item.prev;
            }
        });
        
        saveData();
        updateUI();
        document.getElementById('winModal').classList.remove('show');
    }

    function editName(id) {
        const p = players.find(x => x.id === id);
        const n = prompt('Name ändern:', p.name);
        if (n && n.trim()) { p.name = n.trim(); saveData(); updateUI(); }
    }

    function deletePlayer(id) {
        if (!confirm('Spieler löschen?')) return;
        players = players.filter(p => p.id !== id);
        undoStack = undoStack.filter(u => u.data.every(d => players.find(p => p.id === d.id)));
        saveData();
        updateUI();
    }

    function newGame() {
        if (players.length && !confirm('Wirklich alles löschen?')) return;
        players = [];
        currentRound = 1;
        undoStack = [];
        document.getElementById('winModal').classList.remove('show');
        saveData();
        updateUI();
    }

    function showHistory() {
        const tbl = document.getElementById('histTable');
        const maxR = Math.max(...players.map(p => p.rounds.length), 0);
        
        if (maxR === 0) {
            tbl.innerHTML = '<p style="text-align:center;color:#999;">Keine Runden gespielt</p>';
        } else {
            let html = '<table class="hist-table"><tr><th>Runde</th>';
            players.forEach(p => html += '<th>' + p.name + '</th>');
            html += '</tr>';
            
            for (let r = 0; r < maxR; r++) {
                html += '<tr><td><strong>' + (r + 1) + '</strong></td>';
                players.forEach(p => {
                    const v = p.rounds[r];
                    const c = v > 0 ? 'color:green' : (v < 0 ? 'color:red' : '');
                    html += '<td style="' + c + '">' + (v || 0) + '</td>';
                });
                html += '</tr>';
            }
            
            html += '<tr class="sum"><td>SUMME</td>';
            players.forEach(p => html += '<td>' + p.total + '</td>');
            html += '</tr></table>';
            tbl.innerHTML = html;
        }
        
        document.getElementById('histModal').classList.add('show');
    }

    function closeHistory() {
        document.getElementById('histModal').classList.remove('show');
    }

    function closeWinner() {
    document.getElementById('winModal').classList.remove('show');
}

function updateUI() {
    document.getElementById('cRound').textContent = currentRound;
    document.getElementById('undoBtn').style.display = undoStack.length ? 'inline-block' : 'none';
    document.getElementById('histBtn').style.display = currentRound > 1 ? 'inline-block' : 'none';
    
    const grid = document.getElementById('playersGrid');
    if (players.length === 0) {
        grid.innerHTML = '<div class="empty">Füge Spieler mit ➕ hinzu</div>';
        return;
    }
    
    grid.innerHTML = players.map((p, i) => `
        <div class="player-card ${p.total >= targetScore ? 'winner' : ''}">
            <div class="card-header">
                <div class="card-name" onclick="editName(${p.id})">${p.name}</div>
                <button class="card-delete" onclick="deletePlayer(${p.id})">✕</button>
            </div>
            <div class="card-score">${p.total}</div>
            <input type="number" 
                   class="p-input card-input" 
                   id="inp-${p.id}"
                   placeholder="0"
                   inputmode="numeric"
                   enterkeyhint="done"
                   onkeypress="if(event.key==='Enter') document.getElementById('inp-${players[i+1]?.id || players[0].id}').focus()">
        </div>
    `).join('');
}
</script>
</body>
</html>
